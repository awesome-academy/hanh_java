# src/main/resources/application-prod.yml
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&serverTimezone=Asia/Ho_Chi_Minh
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none

  thymeleaf:
    cache: true

springdoc:
  api-docs:
    enabled: false             # tắt Swagger hoàn toàn trên prod

jwt:
  secret: ${JWT_SECRET}

app:
  upload-dir: ${UPLOAD_DIR}
  base-url: ${APP_BASE_URL}

logging:
  level:
    root: WARN
    com.psms: INFO