# =============================================================
# Validation messages — tiếng Việt, lưu UTF-8
# Được bảo vệ bởi .gitattributes:
#   *.properties text eol=lf working-tree-encoding=UTF-8
# =============================================================

# --- Full name ---
validation.fullName.required=Họ và tên không được để trống
validation.fullName.size=Họ và tên không được vượt quá {max} ký tự

# --- Email ---
validation.email.required=Email không được để trống
validation.email.invalid=Email không đúng định dạng
validation.email.size=Email không được vượt quá {max} ký tự

# --- Password ---
validation.password.required=Mật khẩu không được để trống
validation.password.size=Mật khẩu phải từ {min} đến {max} ký tự

# --- Phone ---
validation.phone.size=Số điện thoại không được vượt quá {max} ký tự
validation.phone.pattern=Số điện thoại không đúng định dạng (ví dụ: 0912345678 hoặc +84912345678)

# --- National ID (CCCD / CMND) ---
validation.nationalId.required=Số CCCD/CMND không được để trống
validation.nationalId.size=Số CCCD/CMND không được vượt quá {max} ký tự
validation.nationalId.pattern=Số CCCD/CMND phải có đúng 9 hoặc 12 chữ số

# --- Date of birth ---
validation.dateOfBirth.pastOrPresent=Ngày sinh không được là ngày trong tương lai

# --- Address ---
validation.ward.size=Tên phường/xã không được vượt quá {max} ký tự
validation.province.size=Tên tỉnh/thành phố không được vượt quá {max} ký tự

# --- Change Password ---
validation.oldPassword.required=Mật khẩu cũ không được để trống
validation.password.new.required=Mật khẩu mới không được để trống
validation.password.new.size=Mật khẩu mới phải từ {min} đến {max} ký tự
validation.password.confirm.required=Xác nhận mật khẩu không được để trống

# --- Submit Application ---
validation.serviceType.required=Vui lòng chọn dịch vụ cần nộp hồ sơ

# --- Assign Staff ---
validation.staff.required=Cán bộ không được để trống

# --- Application Status ---
validation.status.required=Trạng thái không được để trống

# --- Refresh Token ---
validation.refreshToken.required=Refresh token không được để trống

# --- Create User - Role ---
validation.role.required=Phải chọn ít nhất một vai trò
