<!DOCTYPE html>
<html th:replace="~{layout/client :: layout('Dịch vụ công', ~{:: main})}"
      xmlns:th="http://www.thymeleaf.org"
      lang="vi">
<head></head>
<body>
<main>

    <div class="pg-hd">
        <div>
            <h1>Dịch vụ công</h1>
            <p>Tìm kiếm và nộp hồ sơ trực tuyến</p>
        </div>
    </div>

    <!-- ── Filter bar ─────────────────────────────────────────────── -->
    <form class="fbar" method="get" th:action="@{/services}">
        <input class="fi" type="text" name="keyword"
               th:value="${keyword}"
               placeholder="Tìm tên dịch vụ...">

        <select class="fi-s" name="categoryId">
            <option value="">Tất cả lĩnh vực</option>
            <option th:each="cat : ${categories}"
                    th:value="${cat.id}"
                    th:text="${cat.name}"
                    th:selected="${cat.id == categoryId}">
            </option>
        </select>

        <button type="submit" class="btn btn-p btn-sm">Tìm kiếm</button>
        <a th:href="@{/services}" class="btn btn-o btn-sm"
           th:if="${keyword != null or categoryId != null}">
            Xoá filter
        </a>
    </form>

    <!-- ── Service list ───────────────────────────────────────────── -->
    <div class="svc-list">
        <div th:if="${services.isEmpty()}" class="empty-box sm">
            <div class="empty-icon">🔍</div>
            <div class="empty-title">Không tìm thấy dịch vụ nào</div>
            <div class="empty-sub">Thử thay đổi từ khoá hoặc lĩnh vực</div>
        </div>

        <a class="svc" th:each="svc, iter : ${services.content}"
           th:href="@{/services/{id}(id=${svc.id})}">
            <div class="svc-ic">📋</div>
            <div class="svc-info">
                <div class="svc-name" th:text="${svc.name}">Tên dịch vụ</div>
                <div class="svc-meta">
                    <span class="pill p-blue" th:text="${svc.categoryName}">Lĩnh vực</span>
                    <span th:text="${svc.processingTimeDays} + ' ngày'">5 ngày</span>
                    <span th:text="${svc.fee.signum() == 0 ? 'Miễn phí' : #numbers.formatInteger(svc.fee, 0, 'COMMA') + ' VNĐ'}">
                        Miễn phí
                    </span>
                </div>
            </div>
            <span class="svc-dept" th:text="${svc.departmentName}">Phòng ban</span>
        </a>
    </div>

    <!-- ── Pagination ─────────────────────────────────────────────── -->
    <div class="pager" th:if="${services.totalPages > 1}">
        <div class="pg-info"
             th:text="${'Hiển thị ' + displayFrom + '–' + displayTo + ' / ' + services.totalElements + ' dịch vụ'}">
        </div>
        <div class="pg-btns">
            <span class="pg on" th:if="${!services.hasPrevious()}">← Trước</span>
            <a class="pg" th:unless="${!services.hasPrevious()}"
               th:href="@{/services(keyword=${keyword},categoryId=${categoryId},page=${services.number - 1})}">
                ← Trước
            </a>
            <th:block th:each="i : ${#numbers.sequence(pageStart, pageEnd)}">
                <a class="pg"
                   th:classappend="${i == services.number} ? ' on'"
                   th:href="@{/services(keyword=${keyword},categoryId=${categoryId},page=${i})}"
                   th:text="${i + 1}">
                </a>
            </th:block>
            <span class="pg on" th:if="${!services.hasNext()}">Tiếp →</span>
            <a class="pg" th:unless="${!services.hasNext()}"
               th:href="@{/services(keyword=${keyword},categoryId=${categoryId},page=${services.number + 1})}">
                Tiếp →
            </a>
        </div>
    </div>

</main>
</body>
</html>
