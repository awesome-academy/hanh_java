<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Truy cap bi tu choi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #F0F4FA; color: #1A2540; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .error-page { text-align: center; padding: 2rem; }
        .error-code { font-size: 6rem; font-weight: 700; color: #DC2626; line-height: 1; }
        .error-title { font-size: 1.5rem; margin: 1rem 0 0.5rem; }
        .error-desc { color: #64748B; margin-bottom: 2rem; }
        .btn-home { display: inline-block; padding: 0.75rem 2rem; background: #0D3B7C; color: #fff; text-decoration: none; border-radius: 6px; }
        .btn-home:hover { background: #0a2f63; }
    </style>
</head>
<body>
<div class="error-page">
    <div class="error-code">403</div>
    <h1 class="error-title">Truy cap bi tu choi</h1>
    <p class="error-desc">Ban khong co quyen truy cap trang nay.</p>
    <a href="/" class="btn-home">Ve trang chu</a>
</div>
</body>
</html>
